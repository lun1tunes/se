cube3d_path: "test_data2/subcube_3d.segy"
lines2d_paths:
  - "test_data2/2Д_профиль11"
  - "test_data2/2Д_профиль12"
  - "test_data2/2Д_профиль13"
  - "test_data2/2Д_профиль18"
